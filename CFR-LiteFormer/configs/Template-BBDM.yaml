# Brownian Bridge Diffusion Model Template(Pixel Space)
runner: "BBDMRunner"
training:
  n_epochs: 100
  n_steps: 200000
  save_interval: 2
  sample_interval: 2
  validation_interval: 2
  accumulate_grad_batches: 4

testing:
  clip_denoised: True
  sample_num: 5

data:
  dataset_name: 'dataset_name'
  dataset_type: 'custom_aligned'
  dataset_config:
    dataset_path: './LG-BBDM-2'
    image_size: 256
    channels: 3
    to_normal: True
    flip: False
  train:
    batch_size: 1
    shuffle: True
  val:
    batch_size: 1
    shuffle: True
  test:
    batch_size: 1
    # shuffle: False

model:
  model_name: "BrownianBridge" # part of result path
  model_type: "BBDM" # specify a module
  latent_before_quant_conv: False
  normalize_latent: False
  only_load_latent_mean_std: False
  # model_load_path:  # model checkpoint path
  # optim_sche_load_path:  # optimizer scheduler checkpoint path

  EMA:
    use_ema: True
    ema_decay: 0.995
    update_ema_interval: 8 # step
    start_ema_step: 30000

  CondStageParams:
    n_stages: 2
    in_channels: 3
    out_channels: 3

  BB:
    optimizer:
      weight_decay: 0.000
      optimizer: 'Adam'
      lr: 1.e-4
      beta1: 0.9

    lr_scheduler:
      factor: 0.5
      patience: 3000
      threshold: 0.0001
      cooldown: 3000
      min_lr: 5.e-7

    params:
      mt_type: 'linear' # options {'linear', 'sin'}
      objective: 'grad' # options {'grad', 'noise', 'ysubx'}
      loss_type: 'l1' # options {'l1', 'l2'}

      skip_sample: True
      sample_type: 'linear' # options {"linear", "sin"}
      sample_step: 200

      num_timesteps: 1000 # timesteps
      eta: 1.0 # DDIM reverse process eta
      max_var: 1.0 # maximum variance

      UNetParams:
        image_size: 256
        not_use_tanh: False
        nz: 100
        z_emb_dim: 256
        centered: True
        n_mlp: 3
        patch_size: 1
        num_channels_dae: 64
        ch_mult: !!python/tuple
          - 1
          - 2
          - 2
          - 2
          - 4
        in_channels: 6
        fir: True
        fir_kernel: [1, 3, 3, 1]
        conditional: True
        num_channels: 3
        out_channels: 3
        num_res_blocks: 2
        attn_resolutions: [16,]
        resamp_with_conv: True
        dropout: 0.
        skip_rescale: True
        resblock_type: 'biggan'
        progressive: 'none'
        progressive_input: 'residual'
        embedding_type: 'positional'
        progressive_combine: 'sum'




